services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 3000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-escalera}:${POSTGRES_PASSWORD:-change-me-for-local-development}@postgres:5432/${POSTGRES_DB:-escalera}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://object-storage:9000
      S3_BUCKET: ${S3_BUCKET:-escalera-profiles}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-escalera}
      POSTGRES_USER: ${POSTGRES_USER:-escalera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-for-local-development}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  object-storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-escalera-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-for-local-development}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object-storage-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  object-storage-data:
